{% load local_time %}
{% if global_events %}
    <div class="mb-4">
        <h2>Global Events</h2>
        <div class="list-group">
            {% for event in global_events %}
                <div class="list-group-item">
                    <div class="d-flex w-100 justify-content-between align-items-start">
                        <div>
                            <h5 class="mb-1">
                                <a href="{% url 'courses:global_event_detail' pk=event.pk %}">{{ event.title }}</a>
                                <span class="badge bg-info ms-1">Global</span>
                            </h5>
                            <p class="mb-1">
                                <small class="text-muted">{{ event.start_time|local_datetime }} | {{ event.semester }}</small>
                            </p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
